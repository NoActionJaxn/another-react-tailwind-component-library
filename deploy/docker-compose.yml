# Lives on the Oracle VM at /opt/storybook/docker-compose.yml (not deployed by CI).
# The GitHub Actions workflow only runs `docker compose pull && up -d` against this file.
services:
  storybook:
    image: ghcr.io/noactionjaxn/another-react-tailwind-component-library-storybook:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
