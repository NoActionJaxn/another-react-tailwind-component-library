# Lives on the Oracle VM at /opt/storybook/docker-compose.yml (not deployed by CI).
# Each workflow only runs `docker compose pull/up -d <service>` against its own
# service, so a production deploy never restarts staging and vice versa.
#
# Neither service publishes host ports or terminates TLS itself - both join
# the shared `edge` network, and the VM-wide Caddy stack (in /opt/edge, not
# part of this repo) reverse-proxies to them by hostname:
#   another-react-tailwind-component-library.com -> storybook:80
#   staging.another-react-tailwind-component-library.com -> storybook-staging:80
# `edge` is created once on the VM with `docker network create edge` and is
# shared with every other project hosted on this instance.
services:
  storybook:
    image: ghcr.io/noactionjaxn/another-react-tailwind-component-library-storybook:latest
    restart: unless-stopped
    networks:
      - edge

  storybook-staging:
    image: ghcr.io/noactionjaxn/another-react-tailwind-component-library-storybook:staging
    restart: unless-stopped
    networks:
      - edge

networks:
  edge:
    external: true
