# Plain HTTP only - TLS and hostname routing both happen one hop up, in the
# shared Caddy reverse proxy that owns ports 80/443 on the VM (this container
# has no published host ports at all, see deploy/docker-compose.yml). Caddy
# forwards to this container over the internal `edge` Docker network, so
# main and staging can run this exact same config with no divergence.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Storybook's static build fingerprints its JS/CSS assets, so these are safe to cache hard.
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML/manifests must be revalidated so a new deploy is picked up on refresh.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
