# This config is intentionally different from main's - it must NOT include
# the reverse-proxy block main adds for staging.*.com. This container is
# reached either directly (debug ports) or proxied here from the production
# container, which already forwards whatever Host header it received; a
# wildcard server_name means it's served locally either way. If this ever
# proxies to itself again (e.g. via a bad merge from main), it'll loop
# forever until nginx 400s on an oversized request line - see git history.
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Storybook's static build fingerprints its JS/CSS assets, so these are safe to cache hard.
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML/manifests must be revalidated so a new deploy is picked up on refresh.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
