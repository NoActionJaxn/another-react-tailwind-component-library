# Plain HTTP only - TLS and hostname routing both happen one hop up, in the
# shared Caddy reverse proxy that owns ports 80/443 on the VM (this container
# has no published host ports at all, see deploy/docker-compose.yml). Caddy
# forwards to this container over the internal `edge` Docker network, so
# main and staging can run this exact same config with no divergence.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Only the preview iframe's Vite bundle is content-hashed
    # (/assets/<name>-<hash>.js), so it's the only thing safe to cache
    # forever. The manager (sidebar/chrome) bundle under sb-manager/ and
    # sb-addons/, plus anything copied straight from public/ (logo.svg,
    # favicon.svg, fonts), keeps the same filename across deploys - caching
    # those as immutable left Cloudflare's edge and browsers serving a
    # days-old sidebar/logo indefinitely, immune to hard refresh.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Everything else must be revalidated so a new deploy is picked up.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
