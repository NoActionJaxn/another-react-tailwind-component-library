# Our hostnames are long enough (e.g. staging.another-react-tailwind-
# component-library.com, 53 chars) to exceed nginx's default 64-byte
# server_names_hash_bucket_size, which makes it refuse to start entirely.
server_names_hash_bucket_size 128;

server {
    listen 80;
    server_name another-react-tailwind-component-library.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name another-react-tailwind-component-library.com;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Storybook's static build fingerprints its JS/CSS assets, so these are safe to cache hard.
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML/manifests must be revalidated so a new deploy is picked up on refresh.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}

# Routes the staging hostname to the storybook-staging container over the
# private docker-compose network, so Cloudflare only needs a plain DNS record
# for staging - no Origin Rule/port override needed, since both hostnames hit
# this same container on the standard 443 port.
server {
    listen 443 ssl;
    http2 on;
    server_name staging.another-react-tailwind-component-library.com;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Resolve storybook-staging at request time via Docker's embedded DNS
    # (127.0.0.11), not once at nginx startup - so this container starts and
    # keeps serving production fine even if the staging container is down.
    resolver 127.0.0.11 valid=10s;

    location / {
        set $staging_upstream https://storybook-staging:443;
        proxy_pass $staging_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
