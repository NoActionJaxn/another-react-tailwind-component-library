name: Deploy Storybook (staging)

on:
  push:
    branches: [staging]
  workflow_dispatch: {}

concurrency:
  group: deploy-storybook-staging
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.vars.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      # GHCR requires an all-lowercase path; github.repository_owner ("NoActionJaxn") is not.
      - id: vars
        run: echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')-storybook" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # linux/arm64 is required for the Ampere A1 (arm64) Oracle VM - without
      # it, `docker compose pull` on that host fails with "no matching
      # manifest for linux/arm64/v8" since GitHub's runners are amd64 and
      # buildx defaults to only the host platform unless told otherwise.
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.vars.outputs.image }}:staging
            ${{ steps.vars.outputs.image }}:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and redeploy the staging container on the Oracle VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_SSH_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -euo pipefail
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker network create edge 2>/dev/null || true
            cd /opt/storybook
            docker compose pull storybook-staging
            docker compose up -d storybook-staging
            docker image prune -f
